# Architecture

## Overview

EnsembleKit is structured around three concerns: **base learner synthesis** (produce predictions
with a known Bayes answer), **combining** (fuse predictions into one score), and **evaluation**
(recover the Bayes label and assert the dissociation). The combiners are textbook; what is
designed is the experiment.

## Log-odds formulation

A latent score `s ~ N(0, 1)` is the Bayes log-odds. The label is `y ~ Bernoulli(sigmoid(BETA * s))`.
Each base learner reports: `z_k = a_k * s + noise_k` where `a_k` is competence.

**Why log-odds?** Combination is exact in log-odds space. The Bayes optimal combiner under
conditional independence is the sum of the individual log-odds. A uniform average is optimal
when all learners have equal competence. Competence weighting re-weights the log-likelihood
contributions. The Bayes ceiling is exact and computable.

## Base learner synthesis

- `a_k = 1`: learner perfectly tracks `s`
- `a_k = 0`: "dead learner" (pure noise)
- A regime changes the competence vector and noise structure, never the Bayes label.

## Regimes

| Regime | Learner construction | What fails |
|---|---|---|
| homogeneous | All `a_k` equal; iid noise | Control |
| het_competence | One strong `a_k`; rest `a_k = 0` | Uniform combiners dilute the strong learner |
| corrupted | All `a_k` equal; per-sample garbage on random fraction | Fixed-weight combiners can't reject intermittent corruption |

## Combiner implementations

2x2: **weighting** x **aggregation**

**Uniform:** every learner weighted equally.

**Competence weighting:** weights proportional to holdout ranking skill. Static per-learner weight.

**Mean aggregation:** average (weighted or not) log-odds across learners.

**Median aggregation (robust):** per-sample median across learners. Rejects outlier learners sample-by-sample.

| Combiner | Weighting | Aggregation | Dead learners | Per-sample corruption |
|---|---|---|---|---|
| average | uniform | mean | no | no |
| weighted | competence | mean | yes | no |
| robust | uniform | median | no | yes |
| full | competence | median | yes | yes |

## 2x2 dissociation

The axes are genuinely orthogonal: competence weighting is a static per-learner weight that
cannot reject a learner that is garbage on only some samples; a per-sample median has no concept
of learner quality.

## Diversity sweep

Vary inter-learner error correlation `rho` from 0 to 1. As `rho -> 1`, ensemble gain
(ensemble AUROC - best-single AUROC) collapses to zero.

## Module layout

```
ensemblekit/
  synthesis/    -- Bayes label generator, base learner factory
  combiners/    -- average, weighted, robust, full, single
  regimes/      -- homogeneous, het_competence, corrupted
  eval/         -- auroc, gate, diversity
  cli.py        -- CLI entry point
evals/          -- harness.py, gate.py
tests/          -- 76 pytest tests
```
