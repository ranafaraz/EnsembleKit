# Evaluation

## Benchmark setup

- **Samples:** 1600 per cell, 16 random seeds; results are mean AUROC across seeds.
- **Ground truth:** Bayes label `y ~ Bernoulli(sigmoid(BETA * s))` -- exact, no ambiguity.
- **Bayes ceiling:** ~0.80 AUROC.
- **Metric:** AUROC. 1.0 = perfect, 0.5 = chance.
- **Null:** scrambled Bayes labels -- every combiner must fall to ~0.50.

## Regimes

| Regime | Description |
|---|---|
| homogeneous | All learners equally competent (control) |
| het_competence | One strong learner, rest are dead (a_k = 0) |
| corrupted | All competent on average; per-sample garbage on random fraction |

## Results

Mean AUROC over 16 seeds, 1600 samples/cell.

| combiner | ingredients | homogeneous | het_competence | corrupted |
|---|---|--:|--:|--:|
| single | baseline | 0.759 | 0.789 | 0.635 |
| average | uniform + mean | 0.801 | 0.713 | 0.668 |
| weighted | competence + mean | 0.801 | 0.789 | 0.668 |
| robust | uniform + median | 0.797 | 0.586 | 0.770 |
| **full** | **competence + median** | **0.794** | **0.789** | **0.766** |

## Key findings

**Effect 1:** Uniform combiners drop on `het_competence` (average 0.801→0.713, robust 0.797→0.586). Weighted stay at 0.789.

**Effect 2:** Mean combiners drop on `corrupted` (average 0.801→0.668, weighted 0.801→0.668). Median stay at ~0.77.

Only `full` (both ingredients) is robust everywhere.

## Diversity sweep

| error correlation rho | 0.00 | 0.30 | 0.60 | 0.90 | 0.99 |
|---|--:|--:|--:|--:|--:|
| gain (average - best single) | +0.041 | +0.029 | +0.015 | +0.004 | +0.001 |

## Reproduce

```bash
python -m evals.harness     # full table
python -m evals.gate        # CI gate
ensemblekit compare --regime het_competence
ensemblekit diversity
```
